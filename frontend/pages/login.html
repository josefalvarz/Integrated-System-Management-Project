<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — IMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="auth-page">

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-container">

    <div class="auth-brand">
      <div class="auth-brand-icon">IMS</div>
      <div>
        <h2 class="auth-brand-name">Organization X</h2>
        <p class="auth-brand-sub">Management System</p>
      </div>
    </div>

    <div class="auth-card">
      <div class="auth-card-top-rule"></div>

      <h2 class="auth-heading">Welcome back</h2>
      <p class="auth-sub">Sign in to access your account.</p>

      <input type="email"    id="email"    placeholder="Email address" />
      <input type="password" id="password" placeholder="Password" />

      <button onclick="login()">Sign in</button>

      <div class="msg" id="msg"></div>

      <p class="auth-footer">No account? <a href="register.html">Register here</a></p>
    </div>

  </div>

  <script src="../js/login.js"></script>
</body>
</html>

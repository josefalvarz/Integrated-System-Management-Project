<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — IMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="auth-page">

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-container">

    <div class="auth-brand">
      <div class="auth-brand-icon">IMS</div>
      <div>
        <h2 class="auth-brand-name">Organization X</h2>
        <p class="auth-brand-sub">Management System</p>
      </div>
    </div>

    <div class="auth-card">
      <div class="auth-card-top-rule"></div>

      <h2 class="auth-heading">Forgot your password?</h2>
      <p class="auth-sub">Enter your registered email address and we'll send you a link to reset your password.</p>

      <input type="email" id="email" placeholder="Email address" />

      <button onclick="requestReset()">Send reset link</button>

      <div class="msg" id="msg"></div>

      <div id="reset-link-box" style="display:none; margin-top: 0.75rem; padding: 0.75rem; background: #f0f4ff; border-radius: 8px; font-size: 0.85rem; color: #374151; word-break: break-all;">
        <strong>Demo mode — reset link:</strong><br />
        <a id="reset-link-anchor" href="#"></a>
      </div>

      <p class="auth-footer"><a href="login.html">Back to Sign In</a></p>
    </div>

  </div>

  <script src="../js/forgot-password.js"></script>
</body>
</html>

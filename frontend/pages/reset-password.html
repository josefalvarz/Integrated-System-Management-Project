<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — IMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="auth-page">

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-container">

    <div class="auth-brand">
      <div class="auth-brand-icon">IMS</div>
      <div>
        <h2 class="auth-brand-name">Organization X</h2>
        <p class="auth-brand-sub">Management System</p>
      </div>
    </div>

    <div class="auth-card">
      <div class="auth-card-top-rule"></div>

      <h2 class="auth-heading">Set a new password</h2>
      <p class="auth-sub">Choose a strong password with at least 8 characters.</p>

      <input type="password" id="password"        placeholder="New password (min. 8 characters)" />
      <input type="password" id="password-confirm" placeholder="Confirm new password" />

      <button onclick="resetPassword()">Update password</button>

      <div class="msg" id="msg"></div>

      <p class="auth-footer"><a href="login.html">Back to Sign In</a></p>
    </div>

  </div>

  <script src="../js/reset-password.js"></script>
</body>
</html>
